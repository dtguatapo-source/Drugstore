<div class="reports-main-container">

  <div class="reports-header">
    <h2>Informe de Ventas</h2>
    <button class="btn-excel-custom">Exportar Excel</button>
  </div>

  <div class="report-card-box filters-container">
    <div class="filter-grid">

      <div class="filter-group">
        <label>BUSCAR MEDICAMENTO</label>
        <div class="search-wrapper">
          <input type="text" [(ngModel)]="searchText" (input)="onSearch()" placeholder="Nombre del medicamento...">

          <div class="search-results" *ngIf="filteredMedicines.length > 0">
            <div class="result-item" *ngFor="let m of filteredMedicines" (click)="selectMed(m)">
              <strong>{{m.name}}</strong>
              <small>{{m.laboratory}}</small>
            </div>
          </div>
        </div>
      </div>

      <div class="filter-group">
        <label>RANGO DE FECHAS</label>
        <div class="date-inputs-row">
          <div class="date-item">
            <span>Desde</span>
            <input type="date" [(ngModel)]="fechaDesde">
          </div>
          <div class="date-item">
            <span>Hasta</span>
            <input type="date" [(ngModel)]="fechaHasta">
          </div>
        </div>
      </div>

      <div class="filter-actions-column">
        <button class="btn-action-primary" (click)="generarReporte()">
          VER REPORTE
        </button>
        <button class="btn-action-secondary" (click)="limpiarFiltros()">
          LIMPIAR
        </button>
      </div>

    </div>
  </div>

  <div *ngIf="reporteGenerado">
    <div class="report-card-box">
      <div class="report-card-header">
        <h3>Ventas Realizadas</h3>
      </div>

      <div class="report-table-responsive" *ngIf="filteredSales.length > 0; else noSales">
        <table class="report-custom-table">
          <thead>
            <tr>
              <th>FECHA</th>
              <th>MEDICAMENTO</th>
              <th>CANTIDAD</th>
              <th>TOTAL</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let sale of filteredSales">
              <td>{{ sale.date | date:'dd/MM/yyyy' }}</td>
              <td><span class="med-badge">{{ getMedicineName(sale.medicineId) }}</span></td>
              <td>{{ sale.quantity }} uds</td>
              <td class="price-bold">${{ sale.total | number }}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <ng-template #noSales>
        <div class="no-data-msg">No hay ventas registradas.</div>
      </ng-template>
    </div>
  </div>

  <div class="report-footer" style="margin-top: 20px;">
    <button class="btn-return" routerLink="/dashboard">Volver al inicio</button>
  </div>

  <div *ngIf="mensaje" class="alerta" [class.ok]="!error">
    {{ mensaje }}
  </div>

</div>
