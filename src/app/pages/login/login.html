<div class="container">

  <div class="left">
    <div class="card">

      <div class="logo">
        <img src="iconos/flor.png" alt="flor">
      </div>

      <h1>Drogueria Pili</h1>
      <p>SISTEMA DE GESTION</p>

    </div>
  </div>

  <div class="right">
    <div class="login-box">

      <h2>Ingresar al sistema</h2>

      <form (ngSubmit)="login()">

        <div class="input-group">
          <label>Usuario</label>
          <input 
            type="text" 
            [(ngModel)]="username" 
            name="username" 
            placeholder="Ingrese su usuario"
            required
          />
        </div>

        <div class="input-group">
          <label>Contraseña</label>
          <input 
            type="password" 
            [(ngModel)]="password" 
            name="password" 
            placeholder="Ingrese su contraseña"
            required
          />
        </div>

        <!-- BOTON CORRECTO -->
        <button type="submit">
          Ingresar
        </button>

        <!-- BURBUJA -->
        <div *ngIf="error && intento" class="alerta">
          {{ mensaje }}
        </div>

      </form>
    </div>
  </div>

</div>
