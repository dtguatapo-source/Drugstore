<div class="container">

  <!-- lado izquierdo logo -->
  <div class="left">
    <div class="card">

      <div class="logo">
        <img src="iconos/flor.png" alt="flor">
      </div>

      <!-- nombre -->
      <h1>Drogueria Pili</h1>
      <p>SISTEMA DE GESTION</p>

    </div>
  </div>

  <!-- lado derecho login -->
  <div class="right">
    <div class="login-box">

      <h2>Ingresar al sistema</h2>

      <!-- form login -->
      <form (ngSubmit)="login()">

        <!-- usuario -->
        <div class="input-group">
          <label>Usuario</label>
          <input 
            type="text" 
            [(ngModel)]="username" 
            name="username" 
            placeholder="Ingrese su usuario"
            required
          />
        </div>

        <!-- contraseña -->
        <div class="input-group">
          <label>Contraseña</label>
          <input 
            type="password" 
            [(ngModel)]="password" 
            name="password" 
            placeholder="Ingrese su contraseña"
            required
          />
        </div>

        <!-- boton -->
        <button type="submit">Ingresar</button>

        <!-- error -->
        @if (error) {
          <p style="color:red; margin-top:10px; text-align:center;">
            Credenciales invalidas
          </p>
        }

      </form>
    </div>
  </div>

</div>
